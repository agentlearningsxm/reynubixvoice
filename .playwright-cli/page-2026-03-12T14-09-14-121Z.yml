              - paragraph: "A single missed new-patient call costs you $2,000+ in lifetime value cleanings, fillings, crowns, referrals. Your front desk is already juggling check-ins, insurance, and walk-ins. Our AI voice agent handles every inbound call with warmth and precision: confirming insurance, booking the right time slot, and sending appointment reminders. No hold music. No voicemail. Just instant, professional patient care from the very first ring."
