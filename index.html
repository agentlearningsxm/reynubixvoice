  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Syne', 'sans-serif'],
          },
          colors: {
            bg: {
              main: 'var(--bg-main)',
              card: 'var(--bg-card)',
              glass: 'var(--bg-glass)',
            },
            text: {
              primary: 'var(--text-primary)',
              secondary: 'var(--text-secondary)',
            },
            border: {
              DEFAULT: 'var(--border)',
            },
            brand: {
              primary: 'var(--accent-primary)',
              secondary: 'var(--accent-secondary)',
              glow: 'var(--accent-glow)',
              subtle: 'var(--accent-subtle)',
              accent: 'var(--accent-secondary)', // Mapping for backwards compatibility if needed
            },
            money: {
              loss: '#ef4444',
              gain: '#10b981',
            },
            background: "var(--bg-main)",
            foreground: "var(--text-primary)",
            secondary: "var(--bg-card)",
            "muted-foreground": "var(--text-secondary)",
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },

  <link rel="stylesheet" href="/src/styles/global.css">
  <script type="importmap">
{
  "imports": {

  }

  <!-- SVG Filters for Dramatic Animated Border -->
  <svg class="svg-container" style="position: absolute; width: 0; height: 0; overflow: hidden;">
    <defs>
      <!-- Dramatic Filter - uses theme colors -->
      <filter id="dramatic-border-filter" colorInterpolationFilters="sRGB" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="10" result="noise1" seed="1" />
        <feOffset in="noise1" dx="0" dy="0" result="offsetNoise1">
          <animate attributeName="dy" values="700; 0" dur="6s" repeatCount="indefinite" calcMode="linear" />
        </feOffset>

        <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="10" result="noise2" seed="1" />
        <feOffset in="noise2" dx="0" dy="0" result="offsetNoise2">
          <animate attributeName="dy" values="0; -700" dur="6s" repeatCount="indefinite" calcMode="linear" />
        </feOffset>

        <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="10" result="noise1" seed="2" />
        <feOffset in="noise1" dx="0" dy="0" result="offsetNoise3">
          <animate attributeName="dx" values="490; 0" dur="6s" repeatCount="indefinite" calcMode="linear" />
        </feOffset>

        <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="10" result="noise2" seed="2" />
        <feOffset in="noise2" dx="0" dy="0" result="offsetNoise4">
          <animate attributeName="dx" values="0; -490" dur="6s" repeatCount="indefinite" calcMode="linear" />
        </feOffset>

        <feComposite in="offsetNoise1" in2="offsetNoise2" result="part1" />
        <feComposite in="offsetNoise3" in2="offsetNoise4" result="part2" />
        <feBlend in="part1" in2="part2" mode="color-dodge" result="combinedNoise" />

        <feDisplacementMap in="SourceGraphic" in2="combinedNoise" scale="30" xChannelSelector="R"
          yChannelSelector="B" />
      </filter>

      <!-- Hue Animation Filter -->
      <filter id="dramatic-border-hue" colorInterpolationFilters="sRGB" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="7" />
        <feColorMatrix type="hueRotate" result="pt1">
          <animate attributeName="values" values="0;360;" dur=".6s" repeatCount="indefinite" calcMode="paced" />
        </feColorMatrix>
        <feComposite />
        <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="7" seed="5" />
        <feColorMatrix type="hueRotate" result="pt2">
          <animate attributeName="values" values="0; 333; 199; 286; 64; 168; 256; 157; 360;" dur="5s"
            repeatCount="indefinite" calcMode="paced" />
        </feColorMatrix>
        <feBlend in="pt1" in2="pt2" mode="normal" result="combinedNoise" />
        <feDisplacementMap in="SourceGraphic" scale="30" xChannelSelector="R" yChannelSelector="B" />
      </filter>
    </defs>
  </svg>

</head>
